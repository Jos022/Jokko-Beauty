<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/JB-1.png">
    <title>Jokko Beauty | Carrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <header> 
        <nav class="Menu-navegacion"> 
            <a href="index.html">
            <img src="/img/JB-1.png" alt="Jokko Beauty Logo">
            </a>
            <ul class="nav-list">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html" class="carrito-link">
        🛒 <span id="contador-carrito-nav" class="contador-badge">0</span>
    </a></li>
            </ul>
        </nav>
    </header>

<main>
    <h1 style="text-align: center; margin-bottom: 30px; color: #ff5c8a;">Tu Carrito de Compras</h1>
    
    <div class="carrito-layout-principal">
        
        <div id="contenedor-carrito">
            </div>

        <section class="resumen-compra">
            <h2>Resumen del pedido</h2>
            <div class="total-contenedor">
                Total: <span id="precio-total">$0</span>
            </div>
            <div class="acciones-carrito">
                <button id="btn-comprar" class="btn-principal">Iniciar Compra</button>
                <button id="btn-vaciar" class="btn-secundario">Vaciar Carrito</button>
            </div>
        </section>

    </div>
</main>
<div id="modal-compra" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center;">
    <div class="formulario-contacto" style="max-width: 400px; margin: 0 20px; position: relative;">
        <span id="cerrar-modal" style="position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 20px; color: var(--color-secundario);">×</span>
        <h2 style="font-size: 20px; margin-bottom: 15px; text-align: center; color: #ff5c8a;">¡Casi listo!</h2>
        <p style="font-size: 13px; color: var(--color-secundario); text-align: center; margin-bottom: 20px;">Completá tus datos para finalizar tu pedido por WhatsApp.</p>
        
        <form id="form-finalizar-compra">
            <label for="nombre-compra">Tu Nombre:</label>
            <input type="text" id="nombre-compra" required placeholder="Ej: Josefina">
            
            <label for="direccion-compra">Dirección de Envío:</label>
            <input type="text" id="direccion-compra" required placeholder="Ej: Av. Santa Fe 1234">
            
            <input type="submit" value="Continuar a WhatsApp">
        </form>
    </div>
</div>
    
    <footer>
        <h3>Medios de pago</h3>
        <div class="logos-pago">
               <img src="./img/efectivo.png" alt="efectivo">
            <img src="./img/tranferencia.png" alt="transferencia">
            <img src="./img/mastercard.png" alt="master">
            <img src="./img/masterdebito.png" alt="masterdeb">
            <img src="./img/visa.png" alt="visa">
            <img src="./img/visadebito.png" alt="visadeb">
        </div>
        <h3>Nuestras redes</h3>
        <a href="https://www.instagram.com/" target="_blank">Instagram</a>
        <a href="https://www.facebook.com/?locale=es_LA" target="_blank">Facebook</a>
        <br> <br>
        <p>© 2026 Jokko Beauty. Todos los derechos reservados.</p>
    </footer>

    <script src="./js/storage.js"></script>
    <script src="./js/carrito.js"></script>
</body>
</html>
