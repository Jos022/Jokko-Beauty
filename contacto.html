    <h2>Contactate con nosotros</h2>
    <form action="https://formspree.io/f/xbdbozvy" method="POST" class="formulario-contacto">
<label for="nombre">Nombre:</label> <br>
<input type="text" id="nombre" name="nombre" required>
<br>
<label for="email">Correo eletronico:</label> <br>
<input type="email" id="email" name="email" required>
<br>
<label for="textarea">Tu mensaje:</label> <br>
<textarea name="mensaje" id="textarea" placeholder="Escribe tu mensaje:"></textarea>
<br>
    <input type="submit" value="Enviar">
</form>
    </main>
